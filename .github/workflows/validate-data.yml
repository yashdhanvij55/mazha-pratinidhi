name: Validate Data

# Runs automatically whenever you push to GitHub, on any branch.
# This is your safety net: if data.json has a bug (wrong MLA mapping,
# duplicate pincode, missing field), this will fail and show a red X
# on your commit -- catching the kind of bug we found by hand earlier,
# automatically, in seconds.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data validation tests
        run: python test_data.py

      # If test_data.py exits with code 1 (failure), this whole workflow
      # fails and shows a red X next to your commit on GitHub -- you'll
      # see it immediately on the repo page or in your email notifications.
