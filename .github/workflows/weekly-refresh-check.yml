name: Weekly Data Refresh Check

# Runs automatically every Monday at 6am IST (00:30 UTC). This does NOT
# auto-push changes -- it just rebuilds data.json from your current CSV
# and mapping files, runs the test suite, and tells you (via the Actions
# tab / email) if anything looks different or broken.
#
# Why not auto-push? Because PINCODE_TO_CONSTITUENCY, MP_BY_ASSEMBLY_CONSTITUENCY,
# etc. are still manually maintained -- this workflow can't re-scrape PRS
# for you yet. Its job right now is just to remind you to check in,
# and to make sure build_data.py still runs cleanly every week.
#
# Later, once we add a real PRS scraper that updates prs_raw_mla_data.csv
# automatically, this same workflow can be extended to auto-commit fresh
# data -- but auto-committing unverified data before that point would be
# risky, so we're holding off intentionally.

on:
  schedule:
    - cron: '30 0 * * 1'   # Every Monday, 00:30 UTC = 6:00 AM IST
  workflow_dispatch:        # Lets you also trigger this manually from the GitHub Actions tab

jobs:
  refresh-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild data.json
        run: python build_data.py

      - name: Run data validation tests
        run: python test_data.py

      - name: Check if data.json changed
        id: git-check
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Report if data changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "::warning::data.json changed after rebuild. Review the diff and push manually if it looks correct."
          git diff data.json
