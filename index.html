<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>माझा प्रतिनिधी — Mazha Pratinidhi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi&family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0F2040;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo {
    font-family: 'Tiro Devanagari Marathi', serif;
    font-size: 20px;
  }

  .logo span {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }

  h1 {
    font-family: 'Tiro Devanagari Marathi', serif;
    font-size: clamp(32px, 7vw, 56px);
    margin-bottom: 8px;
  }

  .subtitle {
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
    max-width: 380px;
  }

  .search-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
  }

  .search-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 10px;
    text-align: left;
  }

  .search-row {
    display: flex;
    gap: 10px;
  }

  input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 18px;
    color: #fff;
    outline: none;
  }

  input::placeholder {
    color: rgba(255,255,255,0.25);
  }

  button {
    background: #E8521A;
    border: none;
    border-radius: 10px;
    padding: 14px 22px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
  }

  .status {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    min-height: 18px;
  }

  footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>

<nav>
  <div class="logo">
    माझा प्रतिनिधी
    <span>Mazha Pratinidhi</span>
  </div>
</nav>

<main>
  <h1>तुमचा प्रतिनिधी कोण आहे?</h1>
  <p class="subtitle">Who represents you in Maharashtra? Enter your pincode to find out.</p>

  <div class="search-box">
    <div class="search-label">तुमचा पिनकोड टाका · Enter your pincode</div>
    <div class="search-row">
      <input type="text" id="pincode" placeholder="411 001" maxlength="6">
      <button onclick="searchPincode()">शोधा</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</main>

<footer>माझा प्रतिनिधी · Phase 1 Prototype · Built with public data</footer>

<script>
  function searchPincode() {
    const pin = document.getElementById('pincode').value.trim();
    const status = document.getElementById('status');

    if (pin.length !== 6 || isNaN(pin)) {
      status.textContent = "कृपया योग्य 6 अंकी पिनकोड टाका · Please enter a valid 6-digit pincode";
      return;
    }

    status.textContent = "लवकरच येत आहे... · Coming soon — this is where results will appear!";
  }
</script>

</body>
</html>
